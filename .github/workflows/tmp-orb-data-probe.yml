name: Temporary ORB data transfer

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Download public EQUIML minute-data archive
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p transfer
          python - <<'PY'
          import hashlib, json, os, urllib.request
          url='https://www.kaggle.com/api/v1/datasets/download/manognap2505/equiml'
          out='transfer/equiml.zip'
          req=urllib.request.Request(url,headers={'User-Agent':'Mozilla/5.0'})
          h=hashlib.sha256()
          with urllib.request.urlopen(req,timeout=300) as r, open(out,'wb') as f:
              while True:
                  b=r.read(1024*1024)
                  if not b: break
                  h.update(b); f.write(b)
          meta={'source_url':url,'bytes':os.path.getsize(out),'sha256':h.hexdigest()}
          with open('transfer/source.json','w') as f: json.dump(meta,f,indent=2)
          print(meta)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: equiml-source-archive
          path: |
            transfer/equiml.zip
            transfer/source.json
          if-no-files-found: error
          compression-level: 0
          retention-days: 1
