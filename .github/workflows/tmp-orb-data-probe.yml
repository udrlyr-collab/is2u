name: Temporary ORB data probe

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Probe candidate Kaggle dataset references
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p probe
          python - <<'PY'
          import json, urllib.parse, urllib.request
          from urllib.error import HTTPError

          headers={'User-Agent':'Mozilla/5.0'}
          refs=[
            'cesarecastro/cleaned-spy-and-qqq-1-minute-data',
            'yug201/aapl-price-dataset-all-timeframe',
            'yug201/tsla-price-dataset-all-timeframe',
            'yug201/amd-price-dataset-all-timeframe',
            'yug201/spy-price-dataset-all-timeframe',
            'yug201/qqq-price-dataset-all-timeframe',
            'yug201/meta-price-dataset-all-timeframe',
            'yug201/googl-price-dataset-all-timeframe',
          ]
          out={'direct':{},'search':{}}
          for ref in refs:
            try:
              url='https://www.kaggle.com/api/v1/datasets/view/'+ref
              with urllib.request.urlopen(urllib.request.Request(url,headers=headers),timeout=60) as r:
                m=json.load(r)
              summary={k:m.get(k) for k in ['ref','title','subtitle','description','totalBytes','lastUpdated','licenseName','usabilityRating']}
              summary['keys']=sorted(m.keys())
              for key in ['resources','files','datasetFiles']:
                if key in m:
                  summary[key]=m[key]
              out['direct'][ref]=summary
            except Exception as e:
              out['direct'][ref]={'error':repr(e)}
          for q in ['amd price dataset all timeframe yug201','spy price dataset all timeframe yug201','qqq price dataset all timeframe yug201','AMD 1 minute stock data','US stocks 1 minute AAPL AMD TSLA SPY QQQ']:
            url='https://www.kaggle.com/api/v1/datasets/list?'+urllib.parse.urlencode({'search':q,'page':1})
            with urllib.request.urlopen(urllib.request.Request(url,headers=headers),timeout=60) as r:
              rows=json.load(r)
            out['search'][q]=[{k:x.get(k) for k in ['ref','title','subtitle','totalBytes','lastUpdated']} for x in rows[:50]]
          with open('probe/candidates.json','w') as f: json.dump(out,f,indent=2)
          print(json.dumps(out,indent=2)[:120000])
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orb-data-candidates
          path: probe/candidates.json
          if-no-files-found: warn
          retention-days: 1
